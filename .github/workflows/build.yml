name: Build and Release YuyanIme APK
# 触发条件：当推送符合 'v*' 格式的标签时触发，例如 v1.0.0
on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: 解码 Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ secrets.RELEASE_STORE_FILE }}

      # Step 4: 设置 gradlew 为可执行
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Step 5: 构建 Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_FILE: ${{ secrets.RELEASE_STORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # Step 6: 上传生成的 APK
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Online apk
          path: app/build/outputs/apk/online/release/*.apk